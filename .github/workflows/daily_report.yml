name: Predator Daily Analysis (Unified Arbiter Entry)

on:
  schedule:
    - cron: '30 0 * * 1-5'  # 08:30 台北
    - cron: '0 3 * * 1-5'   # 11:00 台北
    - cron: '30 8 * * 1-5'  # 16:30 台北
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Prefer repo requirements if present; fallback to minimal set to avoid CI break
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas yfinance numpy requests beautifulsoup4 resend matplotlib lxml html5lib
          fi

      # ✅ Single entrypoint (Data-Layer -> Payload -> arbiter_run)
      - name: Run Unified Workflow Master (arbiter_run)
        id: unified_run
        run: |
          python workflow_master.py --session EOD --run L2 --topn 20

      # Only if unified workflow succeeded (no L1 fail / no NO_TRADE)
      - name: Commit and Push Updates
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage artifacts (best-effort)
          git add reports/*.json reports/*.txt data/*.json macro.json || true
          git add data/data_tw-share.csv || true

          if git diff --cached --quiet; then
            echo "No changes detected, skipping push."
          else
            git commit -m "Automated Update: Unified Arbiter PASS [$(date '+%Y-%m-%d %H:%M')]"
            git push
          fi
